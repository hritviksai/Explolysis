# Render.com Blueprint — Backend only (FastAPI)
# Frontend is deployed separately on Vercel (see README)

services:
  - type: web
    name: explolysis-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://explolysis.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.0"
