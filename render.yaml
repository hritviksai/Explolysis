# Render deployment configuration
# Deploy backend (FastAPI) as a Web Service
# Deploy frontend (React) as a Static Site

services:
  # ──────────────────────────────────────────
  # Backend — FastAPI
  # ──────────────────────────────────────────
  - type: web
    name: autoinsight-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false           # Set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://autoinsight.onrender.com,https://your-frontend-name.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0

  # ──────────────────────────────────────────
  # Frontend — React Static Site
  # ──────────────────────────────────────────
  - type: static
    name: autoinsight-frontend
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://autoinsight-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
