# Render.com deployment configuration
# Two services: FastAPI backend (Web Service) + React frontend (Static Site)

services:

  # ── Backend — FastAPI ────────────────────────────────────
  - type: web
    name: explolysis-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false                    # You set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://explolysis.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend — React Static Site ────────────────────────
  - type: static
    name: explolysis
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://explolysis-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
